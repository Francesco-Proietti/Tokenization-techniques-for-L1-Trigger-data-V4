# Jet constituents data-loading config

# Name of the data-loading
name: jet_const

# Path to the train folder
train_path: "/run/media/francesco/STORAGE/data_cern_2/Train"

# Path to the validation folder
val_path: "/run/media/francesco/STORAGE/data_cern_2/Val"

# Path to the test folder
test_path: "/run/media/francesco/STORAGE/data_cern_2/Test"

# Select the features
features:
  - L1T_PUPPIPart_PT
  - L1T_PUPPIPart_Eta
  - L1T_PUPPIPart_Phi
  - L1T_PUPPIPart_PuppiW
  - L1T_JetPuppiAK4_PT
  - L1T_JetPuppiAK4_Eta
  - L1T_JetPuppiAK4_Phi
  - L1T_JetPuppiAK4_Mass
  - L1T_JetPuppiAK4_ConstituentsIdx

# Select the maximum number of particles per single jet
max_particles: 128

# Set the preprocessing (True/False)
preprocessing: True

# Number of workers
num_workers: 0
